name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }

      - name: Compile
        shell: pwsh
        run: |
          python -m py_compile main.py main_window.py database/db.py
          python -m compileall -q controllers database models services views tests

      - name: Run unit tests
        shell: pwsh
        run: |
          python -m unittest `
            tests.test_validation_service `
            tests.test_pagamento_status_rules `
            tests.test_db_month_alert_helpers `
            tests.test_dashboard_payload_service `
            tests.test_clientes_service `
            tests.test_finance_preferences_integration -v
